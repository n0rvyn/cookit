# linux-inspect v2 Configuration
# Generated by /inspect setup
# Compatible with Ansible inventory format for easy migration.

# ── Connection Defaults ───────────────────────────────────────────────────────
# Applied to all hosts unless overridden per-host.
defaults:
  ansible_user: root
  ansible_port: 22
  timeout: 30                    # SSH command timeout (seconds)
  parallel: 5                    # Max concurrent host connections

# ── Host Inventory ────────────────────────────────────────────────────────────
# Define hosts inline or reference an external Ansible YAML inventory file.
#
# External inventory (optional):
# inventory_file: /path/to/ansible/hosts.yml
#
# Per-host variables:
#   ansible_host          - IP or hostname (required)
#   ansible_port          - SSH port (default: from defaults)
#   ansible_user          - SSH user (default: from defaults)
#   ansible_ssh_private_key_file - Path to SSH key
#   ansible_ssh_pass      - SSH password (requires sshpass; key auth preferred)
#   ansible_become        - Enable sudo (true/false)
#   ansible_become_method - sudo (only sudo supported)
#   ansible_become_pass   - sudo password (optional; omit if NOPASSWD configured)
#   tags                  - Custom tags for filtering and reporting

all:
  children:
    webservers:
      hosts:
        # web1:
        #   ansible_host: 192.168.1.10
        #   ansible_user: deploy
        #   tags: [production, nginx]
    dbservers:
      hosts: {}
    monitoring:
      hosts: {}

# ── Inspection Settings ───────────────────────────────────────────────────────
inspection:
  categories:
    - security
    - vulnerabilities
    - logs
    - system
    - network
    - compliance

  min_severity: LOW              # CRITICAL, HIGH, MEDIUM, LOW
  report_dir: ./reports
  report_format: markdown

# ── Profile Settings ──────────────────────────────────────────────────────────
# Profiles store per-host state: discovery data, baselines, suppressions.
# They evolve automatically based on inspection results.
profiles:
  dir: ./profiles                # Host profile storage directory
  auto_evolve: true              # Enable profile evolution after each run
  auto_apply_non_sensitive: true # Auto-apply non-sensitive evolution proposals

# ── Notification (optional) ───────────────────────────────────────────────────
# notify:
#   threshold: HIGH
